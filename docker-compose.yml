# docker-compose.yml
# Usage: docker compose up -d
# IMPORTANT: You MUST set POSTGRES_PASSWORD and REDIS_PASSWORD in .env before running!
# The compose file will fail to start if these are not set (no insecure defaults).

services:
  # ─────────────────────────────────────────────
  # Signal Server
  # ─────────────────────────────────────────────
  signal-server:
    image: ${SIGNAL_SERVER_IMAGE:-ghcr.io/ikun52012/quantpilot-ai:v4.5.3}
    container_name: signal-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://signal:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/signal_server
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0
      - REDIS_ENABLED=true
      - PYTHONIOENCODING=utf-8
      - AUTO_UPDATE_ENABLED=${AUTO_UPDATE_ENABLED:-true}
    volumes:
      - ./data:/app/data
      - ./trade_logs:/app/trade_logs
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - signal-network

  updater:
    image: ${SIGNAL_UPDATER_IMAGE:-ghcr.io/ikun52012/quantpilot-ai-updater:v4.5.3}
    container_name: signal-updater
    restart: unless-stopped
    working_dir: /workspace
    environment:
      - UPDATER_BASE_DIR=/workspace
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-quantpilot-ai}
      - UPDATE_TARGET_SERVICE=signal-server
      - UPDATE_TARGET_IMAGE=${SIGNAL_SERVER_IMAGE:-ghcr.io/ikun52012/quantpilot-ai:v4.5.3}
      - UPDATE_TARGET_HEALTH_URL=http://signal-server:8000/health
      - UPDATER_ROLLOUT_TIMEOUT_SECS=180
      - UPDATER_HEARTBEAT_SECS=10
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - signal-server
    networks:
      - signal-network

  # ─────────────────────────────────────────────
  # PostgreSQL Database (Production)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: signal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: signal_server
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signal_server"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - signal-network

  # ─────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: signal-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a '${REDIS_PASSWORD:?REDIS_PASSWORD must be set}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - signal-network

  # ─────────────────────────────────────────────
  # Prometheus (Optional - Metrics)
  # ─────────────────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: signal-prometheus
