  #     - prometheus-data:/prometheus
  #   ports:
  #     - "127.0.0.1:9090:9090"
  #   networks:
  #     - signal-network

  # ─────────────────────────────────────────────
  # Grafana (Optional - Dashboards)
  # ─────────────────────────────────────────────
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: signal-grafana
  #   restart: unless-stopped
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   ports:
  #     - "127.0.0.1:3000:3000"
