  #     - prometheus
  #   networks:
  #     - signal-network

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  signal-network:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  # prometheus-data:
  # grafana-data:
